name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build agent-chat
      run: |
        dotnet publish src/apps/agent-chat/agent-chat.fsproj \
          -c Release \
          -o publish/agent-chat \
          --self-contained false

    - name: Build research-agent
      run: |
        dotnet publish src/apps/research-agent/research-agent.fsproj \
          -c Release \
          -o publish/research-agent \
          --self-contained false

    - name: Calculate next version
      id: version
      shell: bash
      run: |
        # Get latest tag (format: vYYYY.MM.DD.NNN)
        latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v2000.01.01.000")
        echo "Latest tag: $latest"
        
        # Get today's date
        today=$(date +%Y.%m.%d)
        
        # Extract date from latest tag
        last_date=$(echo "$latest" | grep -oE '[0-9]{4}\.[0-9]{2}\.[0-9]{2}' || echo "2000.01.01")
        
        # Extract counter from latest tag
        counter=$(echo "$latest" | grep -oE '\.[0-9]{3}$' | tr -d '.' || echo "0")
        
        echo "Last date: $last_date"
        echo "Counter: $counter"
        
        # If same day, increment counter; else reset to 1
        if [ "$today" = "$last_date" ]; then
          counter=$((counter + 1))
        else
          counter=1
        fi
        
        # Format: vYYYY.MM.DD.NNN
        version="v${today}.$(printf '%03d' $counter)"
        
        echo "Version: $version"
        echo "version=$version" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        generate_release_notes: true
        files: |
          publish/agent-chat/*
          publish/research-agent/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}