name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build agent-chat
      run: |
        dotnet publish src/apps/agent-chat/agent-chat.fsproj \
          -c Release \
          -o publish/agent-chat \
          --self-contained false

    - name: Build research-agent
      run: |
        dotnet publish src/apps/research-agent/research-agent.fsproj \
          -c Release \
          -o publish/research-agent \
          --self-contained false

    - name: Create zip archives
      run: |
        cd publish
        zip -r agent-chat.zip agent-chat/
        zip -r research-agent.zip research-agent/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          publish/agent-chat.zip
          publish/research-agent.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}